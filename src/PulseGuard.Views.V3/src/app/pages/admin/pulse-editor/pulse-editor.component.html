<div class="container-fluid my-3">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0">
        <i class="bi bi-activity"></i> {{ isCreate() ? 'Create Pulse Check' : 'Edit Pulse Check' }}
      </h2>
      <a [routerLink]="['/admin', backTab()]" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      @if (loading()) {
        <app-loading-spinner />
      } @else {
        <form (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="group" class="form-label">Group</label>
              <input type="text" class="form-control" id="group" [ngModel]="config().group" (ngModelChange)="updateField('group', $event)" name="group" />
            </div>
            <div class="col-md-6">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" [ngModel]="config().name" (ngModelChange)="updateField('name', $event)" name="name" required />
            </div>
            <div class="col-md-6">
              <label for="type" class="form-label">Type</label>
              <select class="form-select" id="type" [ngModel]="config().type" (ngModelChange)="updateField('type', $event)" name="type">
                @for (t of pulseCheckTypes; track t) {
                  <option [value]="t">{{ t }}</option>
                }
              </select>
            </div>
            <div class="col-md-6">
              <label for="location" class="form-label">Location (URL)</label>
              <input type="url" class="form-control" id="location" [ngModel]="config().location" (ngModelChange)="updateField('location', $event)" name="location" />
            </div>
            <div class="col-md-4">
              <label for="timeout" class="form-label">Timeout (seconds)</label>
              <input type="number" class="form-control" id="timeout" [ngModel]="config().timeout" (ngModelChange)="updateField('timeout', $event)" name="timeout" min="1" />
            </div>
            <div class="col-md-4">
              <label for="degrationTimeout" class="form-label">Degradation Timeout (seconds)</label>
              <input type="number" class="form-control" id="degrationTimeout" [ngModel]="config().degrationTimeout" (ngModelChange)="updateField('degrationTimeout', $event)" name="degrationTimeout" />
            </div>
            <div class="col-md-4">
              <label for="authenticationId" class="form-label">Credential</label>
              <select class="form-select" id="authenticationId" [ngModel]="config().authenticationId" (ngModelChange)="updateField('authenticationId', $event)" name="authenticationId">
                <option value="">None</option>
                @for (cred of credentials(); track cred.id) {
                  <option [value]="cred.id">{{ cred.name }} ({{ cred.type }})</option>
                }
              </select>
            </div>
            <div class="col-12">
              <label for="comparisonValue" class="form-label">Comparison Value</label>
              <input type="text" class="form-control" id="comparisonValue" [ngModel]="config().comparisonValue" (ngModelChange)="updateField('comparisonValue', $event)" name="comparisonValue" />
            </div>
            <div class="col-12">
              <label for="headers" class="form-label">Headers (JSON)</label>
              <textarea class="form-control" id="headers" rows="3" [ngModel]="config().headers" (ngModelChange)="updateField('headers', $event)" name="headers"></textarea>
            </div>
            <div class="col-md-6 d-flex align-items-center gap-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="enabled" [ngModel]="config().isEnabled" (ngModelChange)="updateField('isEnabled', $event)" name="enabled" />
                <label class="form-check-label" for="enabled">Enabled</label>
              </div>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="ignoreSslErrors" [ngModel]="config().ignoreSslErrors" (ngModelChange)="updateField('ignoreSslErrors', $event)" name="ignoreSslErrors" />
                <label class="form-check-label" for="ignoreSslErrors">Ignore SSL Errors</label>
              </div>
            </div>
          </div>
          <div class="mt-3">
            <button type="submit" class="btn btn-primary" [disabled]="saving()">
              @if (saving()) {
                <span class="spinner-border spinner-border-sm me-1"></span>
              }
              {{ isCreate() ? 'Create' : 'Save' }}
            </button>
            <a [routerLink]="['/admin', backTab()]" class="btn btn-secondary ms-2">Cancel</a>
          </div>
        </form>
      }
    </div>
  </div>
</div>
