<div class="container-fluid my-3">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0"><i class="bi bi-people-fill"></i> {{ isCreate() ? 'Create User' : 'Edit User' }}</h2>
      <a [routerLink]="['/admin', backTab()]" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      @if (loading()) {
        <app-loading-spinner />
      } @else {
        <form (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="userId" class="form-label">User ID</label>
              <input type="text" class="form-control" id="userId" [ngModel]="userId()" (ngModelChange)="userId.set($event)" name="userId" [disabled]="!isCreate()" required />
            </div>
            <div class="col-md-6">
              <label for="nickname" class="form-label">Nickname</label>
              <input type="text" class="form-control" id="nickname" [ngModel]="nickname()" (ngModelChange)="nickname.set($event)" name="nickname" />
            </div>
            <div class="col-12">
              <label class="form-label">Roles</label>
              <app-string-list-editor [value]="roles()" (valueChange)="roles.set($event)" placeholder="Role" addLabel="Add Role" />
            </div>
          </div>
          <div class="mt-3">
            <button type="submit" class="btn btn-primary" [disabled]="saving()">
              @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
              {{ isCreate() ? 'Create' : 'Save' }}
            </button>
            <a [routerLink]="['/admin', backTab()]" class="btn btn-secondary ms-2">Cancel</a>
          </div>
        </form>
      }
    </div>
  </div>
</div>
