<div class="container-fluid my-3">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0"><i class="bi bi-key-fill"></i> {{ isCreate() ? 'Create Credential' : 'Edit Credential' }}</h2>
      <a [routerLink]="['/admin', backTab()]" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      @if (loading()) {
        <app-loading-spinner />
      } @else {
        <form (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="credId" class="form-label">Credential ID</label>
              <input type="text" class="form-control" id="credId" [ngModel]="credId()" (ngModelChange)="credId.set($event)" name="credId" [disabled]="!isCreate()" required />
            </div>
            <div class="col-md-6">
              <label for="credType" class="form-label">Type</label>
              <select class="form-select" id="credType" [ngModel]="selectedType()" (ngModelChange)="selectedType.set($event)" name="credType" [disabled]="!isCreate()">
                @for (t of credentialTypes; track t) {
                  <option [value]="t">{{ t }}</option>
                }
              </select>
            </div>

            @switch (selectedType()) {
              @case ('OAuth2') {
                <div class="col-md-6">
                  <label for="tokenEndpoint" class="form-label">Token Endpoint</label>
                  <input type="url" class="form-control" id="tokenEndpoint" [ngModel]="oauth2().tokenEndpoint" (ngModelChange)="updateOAuth2Field('tokenEndpoint', $event)" name="tokenEndpoint" required />
                </div>
                <div class="col-md-6">
                  <label for="clientId" class="form-label">Client ID</label>
                  <input type="text" class="form-control" id="clientId" [ngModel]="oauth2().clientId" (ngModelChange)="updateOAuth2Field('clientId', $event)" name="clientId" required />
                </div>
                <div class="col-md-6">
                  <label for="clientSecret" class="form-label">Client Secret</label>
                  <input type="password" class="form-control" id="clientSecret" [ngModel]="oauth2().clientSecret" (ngModelChange)="updateOAuth2Field('clientSecret', $event)" name="clientSecret" />
                </div>
                <div class="col-md-6">
                  <label for="scopes" class="form-label">Scopes</label>
                  <input type="text" class="form-control" id="scopes" [ngModel]="oauth2().scopes" (ngModelChange)="updateOAuth2Field('scopes', $event)" name="scopes" />
                </div>
              }
              @case ('Basic') {
                <div class="col-md-6">
                  <label for="username" class="form-label">Username</label>
                  <input type="text" class="form-control" id="username" [ngModel]="basic().username" (ngModelChange)="updateBasicField('username', $event)" name="username" />
                </div>
                <div class="col-md-6">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" [ngModel]="basic().password" (ngModelChange)="updateBasicField('password', $event)" name="password" required />
                </div>
              }
              @case ('ApiKey') {
                <div class="col-md-6">
                  <label for="header" class="form-label">Header Name</label>
                  <input type="text" class="form-control" id="header" [ngModel]="apiKey().header" (ngModelChange)="updateApiKeyField('header', $event)" name="header" required />
                </div>
                <div class="col-md-6">
                  <label for="apiKeyVal" class="form-label">API Key</label>
                  <input type="password" class="form-control" id="apiKeyVal" [ngModel]="apiKey().apiKey" (ngModelChange)="updateApiKeyField('apiKey', $event)" name="apiKeyVal" required />
                </div>
              }
            }
          </div>
          <div class="mt-3">
            <button type="submit" class="btn btn-primary" [disabled]="saving()">
              @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
              {{ isCreate() ? 'Create' : 'Save' }}
            </button>
            <a [routerLink]="['/admin', backTab()]" class="btn btn-secondary ms-2">Cancel</a>
          </div>
        </form>
      }
    </div>
  </div>
</div>
