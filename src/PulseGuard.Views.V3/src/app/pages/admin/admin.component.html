<div class="container-fluid my-3">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h2 class="h5 mb-0"><i class="bi bi-gear-fill"></i> Configuration Management</h2>
      <div class="d-flex align-items-center gap-2">
        <a [routerLink]="createEditorPath()" [queryParams]="createEditorParams()" class="btn btn-sm btn-success">
          <i class="bi bi-plus-circle"></i> Create New
        </a>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input" type="checkbox" id="filter-disabled" [checked]="showDisabledOnly()" (change)="toggleDisabledFilter()" />
          <label class="form-check-label" for="filter-disabled">Show Disabled Only</label>
        </div>
      </div>
    </div>
    <div class="card-body">
      @if (loading()) {
        <app-loading-spinner />
      } @else {
        <div class="mb-3">
          <app-search-input (searchChange)="onSearchChange($event)" />
        </div>

        <ul ngbNav #nav="ngbNav" [activeId]="activeTab()" (activeIdChange)="onTabChange($event)" class="nav-tabs">

          <!-- Pulse Checks -->
          <li [ngbNavItem]="1">
            <button ngbNavLink>
              <i class="bi bi-activity"></i><span class="d-none d-sm-inline"> Pulse Checks</span>
              <span class="badge bg-primary ms-1">{{ filteredPulseConfigs().length }}</span>
            </button>
            <ng-template ngbNavContent>
              <app-pulse-list
                [configs]="filteredPulseConfigs()"
                [sortCol]="sortCol()"
                [sortDir]="sortDir()"
                [tabName]="tabName()"
                (sortChange)="sort($event)"
                (toggleChange)="togglePulse($event.config, $event.enabled)"
                (renameItem)="renameConfig($event)"
                (deleteItem)="deletePulseConfig($event)"
              />
            </ng-template>
          </li>

          <!-- Agent Checks -->
          <li [ngbNavItem]="2">
            <button ngbNavLink>
              <i class="bi bi-robot"></i><span class="d-none d-sm-inline"> Agent Checks</span>
              <span class="badge bg-info ms-1">{{ filteredAgentConfigs().length }}</span>
            </button>
            <ng-template ngbNavContent>
              <app-agent-list
                [configs]="filteredAgentConfigs()"
                [sortCol]="sortCol()"
                [sortDir]="sortDir()"
                [tabName]="tabName()"
                (sortChange)="sort($event)"
                (toggleChange)="toggleAgent($event.config, $event.enabled)"
                (renameItem)="renameConfig($event)"
                (deleteItem)="deleteAgentConfig($event)"
              />
            </ng-template>
          </li>

          <!-- Webhooks -->
          <li [ngbNavItem]="3">
            <button ngbNavLink>
              <i class="bi bi-send-exclamation-fill"></i><span class="d-none d-sm-inline"> Webhooks</span>
              <span class="badge bg-success ms-1">{{ filteredWebhooks().length }}</span>
            </button>
            <ng-template ngbNavContent>
              <app-webhook-list
                [webhooks]="filteredWebhooks()"
                [sortCol]="sortCol()"
                [sortDir]="sortDir()"
                [tabName]="tabName()"
                (sortChange)="sort($event)"
                (toggleChange)="toggleWebhook($event.webhook, $event.enabled)"
                (deleteItem)="deleteWebhook($event)"
              />
            </ng-template>
          </li>

          <!-- Users -->
          <li [ngbNavItem]="4">
            <button ngbNavLink>
              <i class="bi bi-people-fill"></i><span class="d-none d-sm-inline"> Users</span>
              <span class="badge bg-warning ms-1">{{ filteredUsers().length }}</span>
            </button>
            <ng-template ngbNavContent>
              <app-user-list
                [users]="filteredUsers()"
                [tabName]="tabName()"
                (renameItem)="renameUser($event)"
                (deleteItem)="deleteUser($event)"
              />
            </ng-template>
          </li>

          <!-- Credentials -->
          @if (hasCredentials()) {
          <li [ngbNavItem]="5">
            <button ngbNavLink>
              <i class="bi bi-key-fill"></i><span class="d-none d-sm-inline"> Credentials</span>
              <span class="badge bg-secondary ms-1">{{ filteredCredentials().length }}</span>
            </button>
            <ng-template ngbNavContent>
              <app-credential-list
                [credentials]="filteredCredentials()"
                [tabName]="tabName()"
                (deleteItem)="deleteCredential($event)"
              />
            </ng-template>
          </li>
          }
        </ul>

        <div [ngbNavOutlet]="nav" class="mt-2"></div>
      }
    </div>
  </div>
</div>
