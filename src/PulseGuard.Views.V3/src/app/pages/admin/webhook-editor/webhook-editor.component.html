<div class="container-fluid my-3">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0"><i class="bi bi-send-exclamation-fill"></i> {{ isCreate() ? 'Create Webhook' : 'Edit Webhook' }}</h2>
      <a routerLink="/admin" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      @if (loading()) {
        <app-loading-spinner />
      } @else {
        <form (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="group" class="form-label">Group</label>
              <input type="text" class="form-control" id="group" [ngModel]="webhook().group" (ngModelChange)="updateField('group', $event)" name="group" />
            </div>
            <div class="col-md-6">
              <label for="name" class="form-label">Name</label>
              <input type="text" class="form-control" id="name" [ngModel]="webhook().name" (ngModelChange)="updateField('name', $event)" name="name" required />
            </div>
            <div class="col-md-6">
              <label for="type" class="form-label">Type</label>
              <select class="form-select" id="type" [ngModel]="webhook().type" (ngModelChange)="updateField('type', $event)" name="type">
                @for (t of webhookTypes; track t) {
                  <option [value]="t">{{ t }}</option>
                }
              </select>
            </div>
            <div class="col-md-6">
              <label for="location" class="form-label">URL</label>
              <input type="url" class="form-control" id="location" [ngModel]="webhook().location" (ngModelChange)="updateField('location', $event)" name="location" />
            </div>
            <div class="col-md-6">
              <label for="secret" class="form-label">Secret</label>
              <input type="password" class="form-control" id="secret" [ngModel]="webhook().secret" (ngModelChange)="updateField('secret', $event)" name="secret" />
            </div>
            <div class="col-md-6">
              <label for="authenticationId" class="form-label">Credential</label>
              <select class="form-select" id="authenticationId" [ngModel]="webhook().authenticationId" (ngModelChange)="updateField('authenticationId', $event)" name="authenticationId">
                <option value="">None</option>
                @for (cred of credentials(); track cred.id) {
                  <option [value]="cred.id">{{ cred.name }} ({{ cred.type }})</option>
                }
              </select>
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="enabled" [ngModel]="webhook().isEnabled" (ngModelChange)="updateField('isEnabled', $event)" name="enabled" />
                <label class="form-check-label" for="enabled">Enabled</label>
              </div>
            </div>
          </div>
          <div class="mt-3">
            <button type="submit" class="btn btn-primary" [disabled]="saving()">
              @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
              {{ isCreate() ? 'Create' : 'Save' }}
            </button>
            <a routerLink="/admin" class="btn btn-secondary ms-2">Cancel</a>
          </div>
        </form>
      }
    </div>
  </div>
</div>
