<div class="container-fluid my-3">
  <div class="row">
    <div class="col-12 col-lg-4">
      <app-pulse-tree />
    </div>
    <div class="col-12 col-lg-8">
      @if (pulseService.selectedPulseId()) {
        <app-pulse-detail [pulseId]="pulseService.selectedPulseId()!" />
      } @else {
        <div class="alert border d-flex flex-column align-items-center">
          <span>« Select a pulse to view its details »</span>
        </div>
      }
    </div>
  </div>
</div>
