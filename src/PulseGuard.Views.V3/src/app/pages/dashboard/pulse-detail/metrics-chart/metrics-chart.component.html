<div class="row d-flex flex-wrap">
  @if (hasCpu()) {
    <div class="col-lg-4 flex-fill mb-2">
      <div class="card">
        <div class="card-header"><i class="bi bi-cpu"></i> CPU</div>
        <div class="card-body metric-chart-container">
          <svg #cpuChart style="display:block;width:100%;"></svg>
          <div #cpuTooltip class="chart-tooltip"></div>
        </div>
      </div>
    </div>
  }
  @if (hasMemory()) {
    <div class="col-lg-4 flex-fill mb-2">
      <div class="card">
        <div class="card-header"><i class="bi bi-memory"></i> Memory</div>
        <div class="card-body metric-chart-container">
          <svg #memChart style="display:block;width:100%;"></svg>
          <div #memTooltip class="chart-tooltip"></div>
        </div>
      </div>
    </div>
  }
  @if (hasIo()) {
    <div class="col-lg-4 flex-fill mb-2">
      <div class="card">
        <div class="card-header"><i class="bi bi-router"></i> IO</div>
        <div class="card-body metric-chart-container">
          <svg #ioChart style="display:block;width:100%;"></svg>
          <div #ioTooltip class="chart-tooltip"></div>
        </div>
      </div>
    </div>
  }
</div>
