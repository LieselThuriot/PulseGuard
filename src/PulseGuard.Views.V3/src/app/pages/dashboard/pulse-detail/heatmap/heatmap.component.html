<div class="card">
  <div class="card-header"><i class="bi bi-geo me-2"></i>Heatmap</div>
  <div class="card-body p-2">
    <div class="heatmap-wrapper">
      <canvas #heatmapCanvas
              role="img" aria-label="Health heatmap showing daily status over the past year"
              (mousemove)="onMouseMove($event)"
              (mouseleave)="onMouseLeave()"
              (click)="onCanvasClick($event)">
      </canvas>
      @if (tooltipVisible()) {
        <div class="heatmap-tooltip"
             [style.left.px]="tooltipX()"
             [style.top.px]="tooltipY()">
          @for (line of tooltipLines(); track $index) {
            <div [class.heatmap-tooltip-title]="$index === 0">{{ line }}</div>
          }
        </div>
      }
    </div>
  </div>
</div>
