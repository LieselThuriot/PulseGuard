<div class="modal-header">
  <h5 class="modal-title">
    <i class="bi bi-arrow-clockwise me-2"></i>New version available
  </h5>
</div>
<div class="modal-body">
  <p class="mb-0">
    A new version of PulseGuard has been deployed. Please reload the page to get the latest version
    and avoid any errors.
  </p>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-primary" (click)="reload()">
    <i class="bi bi-arrow-clockwise me-1"></i> Reload now
  </button>
</div>
